name: CI-smoke

on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # simple health check
      - name: Show Node & npm versions
        run: |
          node -v
          npm -v

      - name: Success message
        run: echo "✅  Repo cloned, Node present — CI smoke test passed."
